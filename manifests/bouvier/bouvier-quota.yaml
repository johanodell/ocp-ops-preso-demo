apiVersion: v1
kind: ResourceQuota
metadata:
  name: bouvier-quota
  namespace: bouvier
spec:
  hard:
    pods: "10"
    requests.cpu: "100m"
    requests.memory: 256Mi
    limits.cpu: "200m"
    limits.memory: 512Mi
    configmaps: "10"
    secrets: "10"
    services: "10"
    persistentvolumeclaims: "0"  # block PVC usage to keep it simple



    