apiVersion: v1
kind: LimitRange
metadata:
  name: bouvier-limitrange
  namespace: bouvier
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: 5m
      memory: 16Mi
    default:
      cpu: 25m
      memory: 64Mi
    max:
      cpu: 100m
      memory: 128Mi
    min:
      cpu: 1m
      memory: 8Mi